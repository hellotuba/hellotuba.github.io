
<!DOCTYPE html>
<html>
<head>
	<title>AQUALIS</title>
	<meta name="description" content="Toto je officiální web minecraftového serveru Aqualis 'play.aqualis.cz'.">
	<meta property="og:title" content="Aqualis - Officialní web">
	<meta property="og:site_name" content="Aqualis">
	<meta property="og:description" content="Toto je oficiální web minecraftového serveru Aqualis 'play.aqualis.cz'.">
	<meta property="og:image" content="https://bybilly.uk/portal/img/minecraft.jpg">
	<meta name="twitter:card" content="summary_large_image">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta charset="utf-8">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/stylesheet.css">
</head>
<body>
	<div class="container">
		<h2>PRACUJE SE NA NOVÉM WEBU!</h2>
		<div class="logo">
			<img src="img/logo.png" alt="MyServer logo">
		</div>
		<div class="items">
			<a href="https://discord.gg/KK7WCm3vBJ" class="item forums">
			<div>
				<img src="img/forums.png" alt="Minecraft forums icon" class="img">
				<p class="subtitle">Piš si na</p>
				<p class="title">Discordu</p>
			</div>
			</a>

			<a href="https://store.aqualis.cz" class="item store">
			<div>
				<img src="img/store.png" alt="Minecraft store icon" class="img">
				<p class="subtitle">Podpoř nás</p>
				<p class="title">Obchod</p>
			</div>
			</a>

			<a href="https://czech-craft.eu/server/aqualis/" class="item vote">
			<div>
				<img src="img/vote.png" alt="Minecraft voting icon" class="img">

				<p class="title">Hlasováním</p>
			</div>
			</a>

		</div>

		<div class="playercount">
			<p>Připoj se k <span class="sip" data-ip="play.aqualis.cz" data-port="33530">
			</span> hráčum kteří práve hrajou <span class="ip">play.aqualis.cz</span></p>
		</div>
	</div>

	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
	<script src="js/firefly.js" type="text/javascript"></script>
	<script src="js/main.js" type="text/javascript"></script>
